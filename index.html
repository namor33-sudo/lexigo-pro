<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexigo Pro</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #1a0f3d, #3b1f73, #5b2ea6);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .phone-screen {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      font-size: 0.9rem;
      background: #8b5cf6;
      padding: 4px 10px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 28px;
      color: #d8ccff;
      font-size: 1rem;
    }

    .label {
      margin-bottom: 10px;
      font-size: 1rem;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      outline: none;
      font-size: 1rem;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.95);
      color: #111827;
    }

    .avatars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .avatar {
      background: rgba(255, 255, 255, 0.14);
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .avatar:hover {
      transform: translateY(-2px);
      border-color: #a78bfa;
      background: rgba(255, 255, 255, 0.2);
    }

    .avatar.selected {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.2);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(90deg, #84cc16, #22c55e);
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.35);
    }

    .answer-btn {
      margin-bottom: 12px;
      text-align: left;
    }

    .status {
      text-align: center;
      margin-top: 16px;
      color: #d8ccff;
      font-size: 0.95rem;
      min-height: 24px;
    }

    .player-row {
      padding: 10px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <div class="phone-screen">
    <div class="logo">Lexigo <span class="badge">PRO</span></div>
    <div class="subtitle">Join the game and get ready to play</div>

    <div class="label">Enter nickname</div>
    <input type="text" id="nickname" placeholder="Type your nickname" />

    <div class="label">Choose avatar</div>
    <div class="avatars">
      <div class="avatar" data-avatar="avatar_1">😀</div>
      <div class="avatar" data-avatar="avatar_2">😎</div>
      <div class="avatar" data-avatar="avatar_3">🤖</div>
      <div class="avatar" data-avatar="avatar_4">🦊</div>
      <div class="avatar" data-avatar="avatar_5">🐼</div>
      <div class="avatar" data-avatar="avatar_6">🐯</div>
      <div class="avatar" data-avatar="avatar_7">👽</div>
      <div class="avatar" data-avatar="avatar_8">🐸</div>
    </div>

    <button id="joinBtn">Join Game</button>
    <div class="status" id="statusMessage"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQtwgEwIH9kTrSXUWWQfrHUQTLhXbJNj8",
      authDomain: "lexigo-pro-24940.firebaseapp.com",
      databaseURL: "https://lexigo-pro-24940-default-rtdb.firebaseio.com",
      projectId: "lexigo-pro-24940",
      storageBucket: "lexigo-pro-24940.firebasestorage.app",
      messagingSenderId: "924447332873",
      appId: "1:924447332873:web:9cd30847ec809c5bb036d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedAvatar = "";

    const avatars = document.querySelectorAll(".avatar");
    const joinBtn = document.getElementById("joinBtn");
    const nicknameInput = document.getElementById("nickname");
    const statusMessage = document.getElementById("statusMessage");

    avatars.forEach((avatar) => {
      avatar.addEventListener("click", () => {
        avatars.forEach((a) => a.classList.remove("selected"));
        avatar.classList.add("selected");
        selectedAvatar = avatar.dataset.avatar;
      });
    });

    joinBtn.addEventListener("click", async () => {
      const nickname = nicknameInput.value.trim();

      if (!nickname) {
        statusMessage.textContent = "Please enter a nickname.";
        return;
      }

      if (!selectedAvatar) {
        statusMessage.textContent = "Please choose an avatar.";
        return;
      }

      statusMessage.textContent = "Joining game...";

      try {
        const playersRef = ref(db, "sessions/game_001/players");
        const newPlayerRef = push(playersRef);

        await set(newPlayerRef, {
          nickname: nickname,
          avatar: selectedAvatar,
          score: 0,
          streak: 0
        });

        showWaitingRoom();
        listenForPlayers();
      } catch (error) {
        statusMessage.textContent = "Error joining game.";
        console.error(error);
      }
    });

    function showWaitingRoom() {
      const container = document.querySelector(".phone-screen");

      container.innerHTML = `
        <div class="logo">Lexigo <span class="badge">PRO</span></div>
        <div class="subtitle">Waiting for host...</div>
        <div id="playerList"></div>
      `;
    }

    function listenForPlayers() {
      const playersRef = ref(db, "sessions/game_001/players");

      onValue(playersRef, (snapshot) => {
        const players = snapshot.val();
        const list = document.getElementById("playerList");

        if (!list) return;

        list.innerHTML = "";

        if (!players) return;

        Object.values(players).forEach((player) => {
          if (!player || !player.nickname) return;

          const div = document.createElement("div");
          div.className = "player-row";
          div.textContent = `${player.avatar} ${player.nickname}`;
          list.appendChild(div);
        });
      });

      listenForGameStatus();
    }

    function listenForGameStatus() {
      const statusRef = ref(db, "sessions/game_001/status");

      onValue(statusRef, async (snapshot) => {
        const status = snapshot.val();

        if (status === "playing") {
          await showQuestionScreen();
        }
      });
    }

    async function showQuestionScreen() {
      const sessionRef = ref(db, "sessions/game_001");
      const sessionSnapshot = await get(sessionRef);
      const sessionData = sessionSnapshot.val();

      if (!sessionData) return;

      const quizId = sessionData.quizId;
      const currentQuestionNumber = sessionData.currentQuestion;

      const quizRef = ref(db, `quizzes/${quizId}`);
      const quizSnapshot = await get(quizRef);
      const quizData = quizSnapshot.val();

      if (!quizData || !quizData.questions) return;

      const questionKey = `q${currentQuestionNumber}`;
      const questionData = quizData.questions[questionKey];

      if (!questionData) return;

      const container = document.querySelector(".phone-screen");

      container.innerHTML = `
        <div class="logo">Lexigo <span class="badge">PRO</span></div>
        <div class="subtitle">Question ${currentQuestionNumber}</div>

        <div style="font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4;">
          ${questionData.question}
        </div>

        <button class="answer-btn" data-option="a">A. ${questionData.options.a}</button>
        <button class="answer-btn" data-option="b">B. ${questionData.options.b}</button>
        <button class="answer-btn" data-option="c">C. ${questionData.options.c}</button>
        <button class="answer-btn" data-option="d">D. ${questionData.options.d}</button>

        <div class="status" id="statusMessage"></div>
      `;

      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const msg = document.getElementById("statusMessage");
          msg.textContent = "You selected option " + button.dataset.option.toUpperCase();
        });
      });
    }
  </script>
</body>
</html>
